<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Focus Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f7f4; color: #1a1a1a; padding: 24px; }
  .top-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
  .sel-wrap { display: flex; flex-direction: column; gap: 4px; }
  .sel-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; }
  select { min-width: 180px; font-size: 13px; padding: 7px 10px; border: 1px solid #e0ddd7; border-radius: 8px; background: #fff; cursor: pointer; }
  button.reset { font-size: 12px; padding: 7px 14px; border: 1px solid #e0ddd7; border-radius: 8px; background: #fff; cursor: pointer; color: #666; }
  button.reset:hover { background: #f0ede8; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .card { background: #fff; border: 1px solid #e8e5df; border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: box-shadow .15s, transform .1s; }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); transform: translateY(-1px); }
  .card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .card-meta { font-size: 11px; color: #888; margin-bottom: 6px; }
  .bar { height: 4px; background: #e8e5df; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .detail-title { font-size: 17px; font-weight: 600; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 600; }
  .master-bar { height: 6px; background: #e8e5df; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
  .master-fill { height: 100%; border-radius: 3px; transition: width .5s; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  @media(max-width:540px){ .two-col { grid-template-columns: 1fr; } }
  .info-card { background: #fff; border: 1px solid #e8e5df; border-radius: 12px; padding: 14px 16px; }
  .info-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  .item { display: flex; align-items: flex-start; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f0ede8; font-size: 13px; line-height: 1.4; }
  .item:last-child { border-bottom: none; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .actions-card { background: #fafaf8; border: 1px solid #e8e5df; border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
  .action-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f0ede8; font-size: 13px; }
  .action-row:last-child { border-bottom: none; }
  .action-num { font-size: 11px; font-weight: 700; color: #aaa; width: 18px; flex-shrink: 0; }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-pill { font-size: 12px; padding: 6px 14px; border-radius: 999px; border: 1px solid; cursor: pointer; font-weight: 500; background: #fff; transition: opacity .15s; }
  .btn-pill:hover { opacity: .75; }
  .section-head { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #444; }
  .mastery-label { font-size: 11px; color: #888; margin-bottom: 1rem; }
</style>
</head>

    <select id="topicSel" onchange="onTopic()" disabled>

  </div>
  <button class="reset" onclick="reset()">Reset</button>
</div>
<div id="content"></div>

function p(n){return Math.min(100,Math.max(0,Math.round(n)));}

function renderOverview(){
  let h=`<p style="font-size:13px;font-weight:600;color:#666;margin-bottom:12px">All domains — click any card to explore</p>`;
  h+=`<div class="grid">`;
  overview.forEach(d=>{
    h+=`<div class="card" onclick="jump('${d.id}')">`;
    h+=`<div class="card-name">${d.domain}</div>`;
    h+=`<div class="card-meta">${d.active} active &nbsp;·&nbsp; ${d.gaps} gaps &nbsp;·&nbsp; ${d.mastery}% mastery</div>`;
    h+=`<div class="bar"><div class="bar-fill" style="width:${d.mastery}%;background:${d.color}"></div></div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">`;
  h+=`<div class="info-card"><div class="info-title">Active this week</div>`;
  ["ROS2 Navigation & TF2","SLAM / VINS","Embedded Linux BSP (i.MX95)","GStreamer + V4L2 Pipelines","Linux Kernel & Drivers","CAN Diagnostics & UDS"]
    .forEach(f=>{ h+=`<div class="item"><span class="dot" style="background:#639922"></span><span>${f}</span></div>`; });
  h+=`</div>`;
  h+=`<div class="info-card"><div class="info-title">Gaps to close</div>`;
  ["Linux Kernel Memory Internals","TensorRT INT8 Calibration","CUDA Optimization","ISO 26262 ASIL","AUTOSAR Adaptive","eBPF & TSN"]
    .forEach(g=>{ h+=`<div class="item"><span class="dot" style="background:#E24B4A"></span><span>${g}</span></div>`; });
  h+=`</div></div>`;
  document.getElementById('content').innerHTML=h;
}

function jump(id){
  document.getElementById('domSel').value=id;
  onDomain();
}

function onDomain(){
  const dom=document.getElementById('domSel').value;
  const ts=document.getElementById('topicSel');
  if(!dom){ts.disabled=true;ts.innerHTML='<option value="">Select domain first</option>';renderOverview();return;}
  const d=DB[dom];
  ts.disabled=false;
  ts.innerHTML=`<option value="">All topics in ${d.label}</option>`;
  Object.keys(d.topics).forEach(t=>{ts.innerHTML+=`<option value="${t}">${t}</option>`;});
  renderDomain(dom);
}

function renderDomain(dom){
  const d=DB[dom];
  let h=`<p style="font-size:13px;font-weight:600;margin-bottom:12px;color:${d.color}">${d.label}</p>`;
  h+=`<div class="grid">`;
  Object.entries(d.topics).forEach(([name,t])=>{
    const m=p(t.mastery);
    h+=`<div class="card" onclick="pick('${name}')">`;
    h+=`<div class="card-name">${name}</div>`;
    h+=`<div class="card-meta">${t.subtopics.length} subtopics &nbsp;·&nbsp; ${t.gaps.length} gaps</div>`;
    h+=`<div class="bar"><div class="bar-fill" style="width:${m}%;background:${d.color}"></div></div>`;
    h+=`<div style="font-size:11px;color:#888;margin-top:4px">${m}% mastery</div>`;
    h+=`</div>`;
  });
  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function pick(name){
  document.getElementById('topicSel').value=name;
  onTopic();
}

function onTopic(){
  const dom=document.getElementById('domSel').value;
  const topic=document.getElementById('topicSel').value;
  if(!dom){renderOverview();return;}
  if(!topic){renderDomain(dom);return;}
  const d=DB[dom]; const t=d.topics[topic];
  if(!t){renderDomain(dom);return;}
  const m=p(t.mastery);
  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">`;
  h+=`<span style="font-size:16px;font-weight:600">${topic}</span>`;
  h+=`<span class="badge" style="background:${d.color}18;color:${d.color};border:1px solid ${d.color}50">${m}% mastery</span>`;
  h+=`</div>`;
  h+=`<div class="master-bar"><div class="master-fill" style="width:${m}%;background:${d.color}"></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">`;
  h+=`<div class="info-card"><div class="info-title">Subtopics</div>`;
  t.subtopics.forEach(s=>{ h+=`<div class="item"><span class="dot" style="background:${d.color}"></span><span>${s}</span></div>`; });
  h+=`</div>`;
  h+=`<div class="info-card"><div class="info-title">Gaps to close</div>`;
  t.gaps.forEach(g=>{ h+=`<div class="item"><span class="dot" style="background:#E24B4A"></span><span>${g}</span></div>`; });
  h+=`</div></div>`;
  h+=`<div class="actions-card"><div class="info-title">Actions — do these next</div>`;
  t.actions.forEach((a,i)=>{ h+=`<div class="action-row"><span class="action-num">${i+1}</span><span style="flex:1">${a}</span></div>`; });
  h+=`</div>`;
  document.getElementById('content').innerHTML=h;
}

function reset(){
  document.getElementById('domSel').value='';
  document.getElementById('topicSel').value='';
  document.getElementById('topicSel').disabled=true;
  document.getElementById('topicSel').innerHTML='<option value="">Select domain first</option>';
  renderOverview();
}

renderOverview();
